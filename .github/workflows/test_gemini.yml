name: Test Gemini Key
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          response=$(curl -s -w "
HTTP_STATUS:%{http_code}"             "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}"             -H "Content-Type: application/json"             -d "{"contents":[{"parts":[{"text":"Reply with exactly one word: hello"}]}]}")
          echo "$response"
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$status" = "200" ]; then
            echo "GEMINI API KEY: VALID"
          else
            echo "GEMINI API KEY: FAILED (HTTP $status)"
            exit 1
          fi
