name: Newsletter

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 5"
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send test to this address only (leave blank for full send to all subscribers)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client beautifulsoup4 lxml

      - name: Run newsletter builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERSONAL_DRIVE_TOKEN_B64: ${{ secrets.PERSONAL_DRIVE_TOKEN_B64 }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: python "[01] Scripts/newsletter_builder.py"

      - name: Commit and push HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/ public/
          git diff --cached --quiet || git commit -m "Auto-publish: newsletter issue $(date -u +%Y-%m-%d) "
          git push origin master