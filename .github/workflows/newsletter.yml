name: Newsletter

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 5"
  workflow_dispatch:
    inputs:
      issue_number_override:
        description: "Force a specific issue number (e.g. 10) instead of auto-increment. Leave blank for normal runs."
        required: false
        default: ""
      week_days_override:
        description: "Widen the story-selection window to N days instead of the normal 7. Leave blank for normal runs."
        required: false
        default: ""
      buttondown_status_override:
        description: "Buttondown send status - 'about_to_send' (live) or 'draft' (saves without sending). Leave blank for normal live send."
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client beautifulsoup4 lxml

      - name: Run newsletter builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERSONAL_DRIVE_TOKEN_B64: ${{ secrets.PERSONAL_DRIVE_TOKEN_B64 }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          ISSUE_NUMBER_OVERRIDE: ${{ github.event.inputs.issue_number_override }}
          WEEK_DAYS_OVERRIDE: ${{ github.event.inputs.week_days_override }}
          BUTTONDOWN_STATUS_OVERRIDE: ${{ github.event.inputs.buttondown_status_override }}
        run: python "[01] Scripts/newsletter_builder.py"

      - name: Commit and push HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/ public/
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Auto-publish: newsletter issue $(date -u +%Y-%m-%d) [skip ci]"
            git push origin master
          fi