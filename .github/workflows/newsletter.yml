name: Newsletter

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 5"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client beautifulsoup4 lxml

      - name: Run newsletter builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERSONAL_DRIVE_TOKEN_B64: ${{ secrets.PERSONAL_DRIVE_TOKEN_B64 }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python "[01] Scripts/newsletter_builder.py"

      - name: Commit and push HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/ public/
          git diff --cached --quiet || git commit -m "Auto-publish: newsletter issue $(date -u +%Y-%m-%d) [skip netlify]"
          git push origin master

      - name: Trigger Netlify deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: >
          curl -s -X POST
          "https://api.netlify.com/api/v1/sites/85ffb101-80cc-482b-a19b-064df6a3dcbb/builds"
          -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN"
          -H "Content-Type: application/json"
          -d "{}"
