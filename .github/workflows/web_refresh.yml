name: Web Refresh

on:
  schedule:
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client beautifulsoup4 lxml

      - name: Run web refresh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERSONAL_DRIVE_TOKEN_B64: ${{ secrets.PERSONAL_DRIVE_TOKEN_B64 }}
        run: python "[01] Scripts/newsletter_builder.py" --web-only

      - name: Commit and push updated website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/latest.html public/index.html
          if git diff --cached --quiet; then
            echo "CONTENT_CHANGED=false" >> $GITHUB_ENV
          else
            git commit -m "Auto-refresh: website update $(date -u +%Y-%m-%dT%H:%M:%SZ) "
            git push origin master
            echo "CONTENT_CHANGED=true" >> $GITHUB_ENV
          fi