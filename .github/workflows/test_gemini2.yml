name: Test Gemini Key
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install -q requests
          python -c "
import os, requests, sys; key=os.environ['GEMINI_API_KEY']; url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+key; r=requests.post(url,json={'contents':[{'parts':[{'text':'Say hello'}]}]},timeout=30); print('HTTP:',r.status_code); print('VALID' if r.status_code==200 else ('FAIL: '+r.text[:200])); sys.exit(0 if r.status_code==200 else 1)
          "
