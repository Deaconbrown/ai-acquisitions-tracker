name: Gemini Diagnostics
on:
  push:
    paths:
      - gemini_diag.py
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q requests
      - name: List Gemini models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gemini_diag.py
